<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .swatch { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
  .chip { width: 72px; height: 52px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,0.06); }
  .name { font-family: var(--font-label); font-size: 10px; font-weight: 700; color: var(--fg-secondary); letter-spacing: .04em; }
  .hex  { font-family: var(--font-body); font-size: 10px; color: var(--fg-tertiary); }
  .section-label { font-family: var(--font-label); font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--fg-tertiary); margin-bottom: 8px; }
</style>
</head>
<body>
<div class="section-label">Основной — Амбарный красный</div>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#fdf2f1"></div><div class="name">50</div><div class="hex">#fdf2f1</div></div>
  <div class="swatch"><div class="chip" style="background:#fae0dc"></div><div class="name">100</div><div class="hex">#fae0dc</div></div>
  <div class="swatch"><div class="chip" style="background:#f5bdb6"></div><div class="name">200</div><div class="hex">#f5bdb6</div></div>
  <div class="swatch"><div class="chip" style="background:#ee9085"></div><div class="name">300</div><div class="hex">#ee9085</div></div>
  <div class="swatch"><div class="chip" style="background:#e45b4a"></div><div class="name">400</div><div class="hex">#e45b4a</div></div>
  <div class="swatch"><div class="chip" style="background:#c94030; outline: 2px solid #3d2b1f; outline-offset:2px"></div><div class="name">500 ★</div><div class="hex">#c94030</div></div>
  <div class="swatch"><div class="chip" style="background:#a8331f"></div><div class="name">600</div><div class="hex">#a8331f</div></div>
  <div class="swatch"><div class="chip" style="background:#8a2a19"></div><div class="name">700</div><div class="hex">#8a2a19</div></div>
</div>
<div class="section-label" style="margin-top:4px">Золотой — Желток / Пшеница</div>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#fef9ec"></div><div class="name">50</div><div class="hex">#fef9ec</div></div>
  <div class="swatch"><div class="chip" style="background:#fdf0c8"></div><div class="name">100</div><div class="hex">#fdf0c8</div></div>
  <div class="swatch"><div class="chip" style="background:#fbe190"></div><div class="name">200</div><div class="hex">#fbe190</div></div>
  <div class="swatch"><div class="chip" style="background:#f8cc55"></div><div class="name">300</div><div class="hex">#f8cc55</div></div>
  <div class="swatch"><div class="chip" style="background:#e8a838; outline:2px solid #3d2b1f; outline-offset:2px"></div><div class="name">400 ★</div><div class="hex">#e8a838</div></div>
  <div class="swatch"><div class="chip" style="background:#d08b1e"></div><div class="name">500</div><div class="hex">#d08b1e</div></div>
  <div class="swatch"><div class="chip" style="background:#a86c10"></div><div class="name">600</div><div class="hex">#a86c10</div></div>
  <div class="swatch"><div class="chip" style="background:#7d500e"></div><div class="name">700</div><div class="hex">#7d500e</div></div>
</div>
</body>
</html>
