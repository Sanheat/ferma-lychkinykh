<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); }
  .form { max-width: 380px; display: flex; flex-direction: column; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  label { font-family: var(--font-label); font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--fg-secondary); }
  input, select, textarea {
    font-family: var(--font-body); font-size: 14px; color: var(--fg-primary);
    background: white; border: 1.5px solid var(--border-light);
    border-radius: var(--radius-md); padding: 10px 14px;
    outline: none; transition: border-color var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out);
    width: 100%;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px rgba(201,64,48,0.12);
  }
  input::placeholder, textarea::placeholder { color: var(--fg-tertiary); }
  input.error { border-color: var(--status-error); }
  input.success { border-color: var(--status-success); }
  .helper { font-family: var(--font-body); font-size: 11px; color: var(--fg-tertiary); }
  .helper.error-msg { color: var(--status-error); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
</style>
</head>
<body>
<div class="form">
  <div class="field">
    <label>Имя</label>
    <input type="text" placeholder="Ваше имя">
  </div>
  <div class="row2">
    <div class="field">
      <label>Телефон</label>
      <input type="tel" placeholder="+7 (___) ___-__-__" class="success">
      <span class="helper" style="color:var(--status-success)">✓ Номер подтверждён</span>
    </div>
    <div class="field">
      <label>Количество</label>
      <input type="number" placeholder="1" min="1">
    </div>
  </div>
  <div class="field">
    <label>Выберите продукт</label>
    <select>
      <option>Яйца куриные С1 — 89 ₽</option>
      <option>Яйца куриные С0 — 119 ₽</option>
      <option>Курица фермерская — 420 ₽/кг</option>
    </select>
  </div>
  <div class="field">
    <label>Адрес доставки</label>
    <input type="text" placeholder="Улица, дом, квартира" class="error">
    <span class="helper error-msg">Укажите адрес доставки</span>
  </div>
  <div class="field">
    <label>Комментарий</label>
    <textarea rows="3" placeholder="Пожелания к заказу..."></textarea>
  </div>
</div>
</body>
</html>
