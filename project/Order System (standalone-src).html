<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ферма Лычкиных — Система заявок</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400&family=PT+Sans:ital,wght@0,400;0,700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'PT Sans',Arial,sans-serif;-webkit-font-smoothing:antialiased;background:#fdfaf4;}
  button{cursor:pointer;}
  select,input,textarea{font-family:inherit;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:#f5edd6;}
  ::-webkit-scrollbar-thumb{background:#c9b299;border-radius:4px;}
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#fdfaf4">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#fdfaf4"/>
    <ellipse cx="640" cy="460" rx="280" ry="200" fill="#c94030"/>
    <circle cx="800" cy="320" r="200" fill="#c94030"/>
    <polygon points="980,260 1100,320 980,380" fill="#e8a838"/>
    <circle cx="840" cy="290" r="42" fill="#fff"/>
    <circle cx="848" cy="290" r="22" fill="#3d2b1f"/>
    <path d="M320,420 Q180,180 600,140 Q500,360 320,420Z" fill="#a8331f"/>
    <text x="600" y="720" font-family="Georgia,serif" font-size="64" font-weight="700" fill="#3d2b1f" text-anchor="middle">Ферма Лычкиных</text>
  </svg>
</template>
<div id="root"></div>

<script type="text/babel" src="components/lp-data.jsx"></script>
<script type="text/babel" src="components/lp-form-bits.jsx"></script>
<script type="text/babel" src="components/lp-client-views.jsx"></script>
<script type="text/babel" src="components/lp-admin-bits.jsx"></script>
<script type="text/babel" src="components/lp-admin-panel.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [mode, setMode] = useState(() => window.location.hash === '#admin' ? 'admin' : 'client');
  const [adminAuthed, setAdminAuthed] = useState(false);
  const [client, setClient] = useState(() => {
    const saved = getClient();
    if (!saved) return null;
    return getCounterparties().find(c => c.id === saved.id) || null;
  });
  const [view, setView] = useState('form');

  useEffect(() => {
    const onHash = () => setMode(window.location.hash === '#admin' ? 'admin' : 'client');
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  const goAdmin  = () => { window.location.hash = '#admin'; setMode('admin'); };
  const goClient = () => { window.location.hash = ''; setMode('client'); setAdminAuthed(false); };
  const logout   = () => { saveClient(null); setClient(null); setView('form'); };

  if (mode === 'admin') {
    if (!adminAuthed) return <LpAdminLogin onLogin={()=>setAdminAuthed(true)} onBack={goClient}/>;
    return <LpAdminPanel onLogout={goClient}/>;
  }
  if (!client) return <LpClientLogin onLogin={c => setClient(c)} onAdmin={goAdmin}/>;
  if (view === 'history') return <LpOrderHistory counterparty={client} onBack={()=>setView('form')}/>;
  return <LpOrderForm counterparty={client} onHistory={()=>setView('history')} onLogout={logout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
