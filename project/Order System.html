<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ферма Лычкиных — Система заявок</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400&family=PT+Sans:ital,wght@0,400;0,700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  /* Brand sans — Inter (18pt for text, 28pt for display sizes) — used by Контрагенты screen */
  @font-face { font-family:'Inter'; src:url('fonts/Inter_18pt-Regular.ttf')  format('truetype'); font-weight:400; font-style:normal; font-display:swap; }
  @font-face { font-family:'Inter'; src:url('fonts/Inter_18pt-Medium.ttf')   format('truetype'); font-weight:500; font-style:normal; font-display:swap; }
  @font-face { font-family:'Inter'; src:url('fonts/Inter_18pt-SemiBold.ttf') format('truetype'); font-weight:600; font-style:normal; font-display:swap; }
  @font-face { font-family:'Inter'; src:url('fonts/Inter_18pt-Bold.ttf')     format('truetype'); font-weight:700; font-style:normal; font-display:swap; }
  @font-face { font-family:'Inter Display'; src:url('fonts/Inter_28pt-SemiBold.ttf') format('truetype'); font-weight:600; font-style:normal; font-display:swap; }
  @font-face { font-family:'Inter Display'; src:url('fonts/Inter_28pt-Bold.ttf')     format('truetype'); font-weight:700; font-style:normal; font-display:swap; }
  :root {
    /* === ЦВЕТА (из Figma — не интерпретировать) === */
    --bg-primary:        #FFFFFF;
    --bg-beige-50:       #FBF9F1;
    --bg-beige-100:      #F5F0DF;

    --red-primary:       #C94030;

    --beige-300:         #DDC594;
    --beige-500:         #C4914C;
    --beige-600:         #B67E40;

    --text-primary:      #191414;
    --text-secondary:    #514C4B;
    --text-tertiary:     #7E7979;
    --text-muted:        #676262;
    --text-alert:        #C9953A;

    --border-light:      #DFDDDD;
    --border-input:      #C6C3C3;
    --border-control:    #ADAAAA;
    --border-divider:    #ECECEC;
    --border-nav:        #EAECF0;

    --gray-200:          #EAECF0;
    --gray-900:          #101828;
    --white:             #FFFFFF;
    --beige-cod-50:      #F9F8F8;

    /* === ТИПОГРАФИКА === */
    --font-family:       'Inter', sans-serif;
    --text-sm:           14px;
    --text-md:           16px;
    --text-display-sm:   30px;
    --lh-sm:             20px;
    --lh-md:             24px;
    --lh-display-sm:     38px;
    --fw-regular:        400;
    --fw-medium:         500;
    --fw-semibold:       600;

    /* === РАДИУСЫ === */
    --radius-sm:         6px;
    --radius-md:         8px;
    --radius-lg:         12px;
    --radius-xl:         16px;
    --radius-2xl:        20px;
    --radius-badge:      16px;

    /* === ТЕНИ === */
    --shadow-xs: 0px 1px 2px 0px rgba(16, 24, 40, 0.05);
    --shadow-sm: 0px 1px 2px 0px rgba(16, 24, 40, 0.06),
                 0px 1px 3px 0px rgba(16, 24, 40, 0.10);
    --shadow-card: 0px 1px 1.5px rgba(16, 24, 40, 0.1),
                   0px 1px 1px rgba(16, 24, 40, 0.06);

    /* === LAYOUT === */
    --sidebar-width:     312px;
    --order-panel-width: 292px;
    --main-padding:      32px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font-family),'PT Sans',Arial,sans-serif;-webkit-font-smoothing:antialiased;background:var(--bg-primary);}
  button{cursor:pointer;}
  select,input,textarea{font-family:inherit;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:#f5edd6;}
  ::-webkit-scrollbar-thumb{background:#c9b299;border-radius:4px;}

  /* ─── Адаптив 1280px (значения из Figma — без интерпретации) ─── */
  @media (max-width: 1280px) {
    /* sidebar с базы 312px (inline-стиль CpSidebar) — не переопределяем, в Figma при 1280 она тоже 312px */
    .main               { width: auto !important; flex: 1 !important; }
    .content-divider    { width: auto !important; flex: 1 !important; }
    .content-parent     { width: auto !important; }
    .content13          { width: auto !important; }
    /* Карточка позиции: Продукт сверху, (Тара + qty) снизу — как .input-dropdown-parent в Figma */
    .input-dropdown-parent {
      flex-direction: column !important;
      align-items: stretch !important;
      align-self: stretch !important;
      justify-content: flex-start !important;
      gap: 12px !important;
      flex: 1 !important;
    }
    .input-dropdown-parent > * {
      flex: 0 0 auto !important;
      width: auto !important;
      align-self: stretch !important;
    }
    .badge { background-color: #f2f4f7 !important; }
  }

  /* ─── Адаптив 1280px: История заказов (точно по Figma) ───
     Обеспечиваем, чтобы все 4 элемента фильтра помещались в одну строку и разносились поровну. */
  @media (max-width: 1280px) {
    .cp-hist-filters    { flex-wrap: nowrap !important; }
    .cp-hist-filter     { flex: 1 1 0 !important; min-width: 0 !important; }
    .cp-hist-clear      { flex: 0 0 auto !important; white-space: nowrap !important; }
  }

  /* ─── Адаптив 1024px ─── 
     Sidebar превращается в drawer (off-canvas слева), вверху появляется
     горизонтальная шапка с лого, названием и бургером.
     Значения по Figma: шапка ~88px, drawer ~50% ширины. */
  @media (max-width: 1024px) {
    /* Layout column-stack: верхний бар сверху, main снизу */
    .cp-layout { flex-direction: column !important; }

    /* Верхняя шапка-бургер */
    .cp-mobile-header {
      display: flex !important;
    }

    /* Sidebar — фиксированный drawer слева, по умолчанию скрыт */
    .sidebar-navigation {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      bottom: 0 !important;
      height: 100vh !important;
      width: min(86vw, 420px) !important;
      min-height: 100vh !important;
      z-index: 60 !important;
      transform: translateX(-100%);
      transition: transform .24s ease-out;
      box-shadow: 0 24px 48px rgba(16, 24, 40, 0.18), 0 0 0 1px rgba(16, 24, 40, 0.05);
      overflow-y: auto;
      align-self: stretch !important;
    }
    .cp-layout.is-mobile-open .sidebar-navigation {
      transform: translateX(0);
    }
    /* Кнопка закрытия — видна только в режиме drawer */
    .cp-drawer-close {
      display: inline-flex !important;
    }
    /* Бэкдроп — виден только когда drawer открыт */
    .cp-layout.is-mobile-open .cp-drawer-backdrop {
      display: block !important;
    }

    /* Внутри main убираем верхний скруглённый угол — теперь у нас сверху бар, не sidebar */
    .main > [data-screen-label] {
      border-radius: 0 !important;
    }
  }

  /* ─── Адаптив 1024px: страница «История заказов» ───
     Точно по Figma 1024:
     • main: padding 32px 0 48px, gap 24 (а не 32)
     • title + filters: горизонтальный padding 32px
     • cards + pagination: горизонтальный padding 24px, gap между карточками 16px
     • размеры/типографика остаются прежними                                          */
  @media (max-width: 1024px) {
    .cp-hist-page {
      padding: 32px 0 48px !important;
      gap: 24px !important;
    }
    .cp-hist-title,
    .cp-hist-filters {
      margin-left: 32px !important;
      margin-right: 32px !important;
    }
    .cp-hist-orders,
    .cp-hist-pagination {
      margin-left: 24px !important;
      margin-right: 24px !important;
    }
  }

  /* ─── Адаптив 768px: страница «История заказов» (точно по Figma) ───
     • Фильтры — вертикальная колонка (Поиск → Период → Продукты → Очистить)
     • «Очистить» сохраняет авто-ширину, прижата к левому краю
     • Ячейки таблицы раскрытого заказа — truncate с ellipsis (узкие колонки) */
  @media (max-width: 768px) {
    .cp-hist-filters {
      flex-direction: column !important;
      align-items: stretch !important;
      flex-wrap: nowrap !important;
      gap: 16px !important;
    }
    .cp-hist-filter {
      flex: 0 0 auto !important;
      width: 100% !important;
      align-self: stretch !important;
    }
    .cp-hist-clear {
      align-self: flex-start !important;
    }
  }

  /* ─── Адаптив 768px ───
     Точно по Figma:
     • Внутри позиции: Продукт (full) → Тара (full) → [Stepper] [🗑] → Замороженное
     • «Способ получения» + «Дата отгрузки» — стек по вертикали
     • Правая колонка (Оформить заявку + Alert) остаётся справа              */
  @media (max-width: 768px) {
    /* Тара + stepper больше не в одной строке: разворачиваем в колонку */
    .input-dropdown-group {
      flex-direction: column !important;
      align-items: flex-start !important;
      gap: 12px !important;
    }
    /* Тара тянется на всю ширину; stepper остаётся «inline» слева */
    .input-dropdown-group > *:first-child {
      align-self: stretch !important;
      width: 100% !important;
    }

    /* В строке позиции корзина «🗑» опускается на уровень stepper */
    .frame-parent {
      align-items: stretch !important;
      gap: 12px !important;
    }
    .frame-parent > button {
      align-self: flex-end !important;
    }

    /* «Способ получения» + «Дата отгрузки» — стек по вертикали */
    .content-parent {
      flex-direction: column !important;
      align-items: stretch !important;
      gap: 20px !important;
    }
    .content-parent > * {
      width: 100% !important;
      align-self: stretch !important;
    }
  }

  /* ─── Адаптив 480px (mobile, цель: 375px): страница «История заказов» ───
     Точно по Figma 375:
     • main-paddings 0 (внутренние блоки имеют свои поля 16/16)
     • title — 30px, поля 16px
     • filter-card — поля 16px, внутренний padding 16
     • cards / pagination — поля 16px, gap 12 между карточками
     • раскрытый заказ: таблица скроллится по горизонтали; столбцы min-width 140px
     • pagination упрощённый: [←] [Страница 1 из 10] [→]                              */
  @media (max-width: 480px) {
    .cp-hist-page {
      padding: 24px 0 32px !important;
      gap: 20px !important;
      max-width: 100% !important;
    }
    .cp-hist-title {
      margin-left: 16px !important;
      margin-right: 16px !important;
    }
    .cp-hist-filters {
      margin-left: 16px !important;
      margin-right: 16px !important;
      padding: 16px !important;
      gap: 12px !important;
    }
    .cp-hist-orders {
      margin-left: 16px !important;
      margin-right: 16px !important;
      gap: 12px !important;
    }
    .cp-hist-pagination {
      margin-left: 16px !important;
      margin-right: 16px !important;
      padding-top: 16px !important;
      justify-content: space-between !important;
      gap: 12px !important;
    }
    /* Раскрытый заказ: таблица скроллится по горизонтали */
    .cp-hist-expand {
      overflow-x: auto !important;
      overflow-y: hidden !important;
      -webkit-overflow-scrolling: touch !important;
    }
    .cp-hist-table {
      min-width: 620px !important;
      width: 620px !important;
    }
    /* Pagination: скрываем нумерацию и текстовые лейблы, показываем компактную метку */
    .cp-hist-pagi-numbers { display: none !important; }
    .cp-hist-pagi-label   { display: none !important; }
    .cp-hist-pagi-info    { display: inline-flex !important; }
    .cp-hist-pagi-prev    { color: #191414 !important; }
  }

  /* ─── Адаптив 640px (mobile, цель: 375px) ───
     Точно по Figma 375:
     • Главный контейнер «форма + правая колонка» → стек по вертикали
     • Боковые отступы 32px → 16px
     • Карточка-итог с «Оформить заявку» + alert уезжают ПОД форму, full-width, без sticky
     • Корзина 🗑 сидит на одной строке со степпером, прижата к правому краю
     • border-radius 40px у верхнего левого угла main — оставляем (как в Figma) */
  @media (max-width: 640px) {
    /* Контейнер → одна колонка, паддинги 16, gap по Figma main = 32 */
    .cp-form-container {
      flex-direction: column !important;
      padding: 0 16px !important;
      gap: 32px !important;
      align-items: stretch !important;
    }
    .cp-banner-wrap {
      padding: 0 16px !important;
    }
    /* Правая колонка → full-width, в общем потоке */
    .cp-order-summary {
      width: 100% !important;
      padding-top: 0 !important;
      position: static !important;
      top: auto !important;
    }

    /* Корзина 🗑 на одной линии со степпером, у правого края */
    .frame-parent {
      position: relative !important;
    }
    .frame-parent > button {
      position: absolute !important;
      right: 0 !important;
      bottom: 0 !important;
      align-self: auto !important;
    }

    /* Восстанавливаем 40px top-left у main (≤1024px правило снимало) */
    .main > [data-screen-label] {
      border-radius: 40px 0 0 0 !important;
    }

    /* «+ Добавить позицию» и «Комментарий» — full-width в одноколоночной форме */
    .content-divider,
    .content13 {
      align-self: stretch !important;
      width: auto !important;
    }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components/lp-data.jsx"></script>
<script type="text/babel" src="components/lp-ui.jsx"></script>
<script type="text/babel" src="components/lp-form-bits.jsx"></script>
<script type="text/babel" src="components/lp-client-views.jsx"></script>
<script type="text/babel" src="components/lp-admin-bits.jsx"></script>
<script type="text/babel" src="components/lp-admin-panel.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const initialMode = () => {
    const h = window.location.hash;
    if (h === '#admin') return 'admin';
    if (h === '#404')   return '404';
    return 'client';
  };
  const [mode, setMode] = useState(initialMode);
  const [adminAuthed, setAdminAuthed] = useState(false);
  const [client, setClient] = useState(() => {
    const saved = getClient();
    if (!saved) return null;
    return getCounterparties().find(c => c.id === saved.id) || null;
  });
  const [view, setView] = useState('form');

  useEffect(() => {
    const onHash = () => setMode(initialMode());
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  const goAdmin  = () => { window.location.hash = '#admin'; setMode('admin'); };
  const goClient = () => { window.location.hash = ''; setMode('client'); setAdminAuthed(false); };
  const go404    = () => { window.location.hash = '#404'; setMode('404'); };
  const logout   = () => { saveClient(null); setClient(null); setView('form'); };

  if (mode === '404') {
    return <Lp404 onBack={()=>{ window.history.back(); }} onHome={goClient}/>;
  }
  if (mode === 'admin') {
    if (!adminAuthed) return <LpAdminLogin onLogin={()=>setAdminAuthed(true)} onBack={goClient}/>;
    return <LpAdminPanel onLogout={goClient}/>;
  }
  if (!client) return <LpClientLogin onLogin={c => setClient(c)} onAdmin={goAdmin}/>;
  if (view === 'history') return <LpOrderHistory counterparty={client} onBack={()=>setView('form')} onLogout={logout}/>;
  return <LpOrderForm counterparty={client} onHistory={()=>setView('history')} onLogout={logout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
