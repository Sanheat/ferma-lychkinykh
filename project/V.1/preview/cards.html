<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-section-alt); }
  .cards { display: flex; gap: 16px; flex-wrap: wrap; }
  .card {
    background: var(--bg-card); border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm); overflow: hidden;
    width: 180px; flex-shrink: 0;
    transition: box-shadow var(--duration-fast) var(--ease-out), transform var(--duration-fast) var(--ease-out);
  }
  .card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .card-img {
    height: 110px; background: var(--bg-section-alt);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .card-badge {
    position: absolute; top: 8px; left: 8px;
    background: var(--brand); color: white;
    font-family: var(--font-label); font-size: 9px; font-weight: 700;
    letter-spacing: .05em; text-transform: uppercase;
    padding: 3px 8px; border-radius: var(--radius-pill);
  }
  .card-body { padding: 12px; }
  .card-tag { font-family: var(--font-label); font-size: 9px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--fg-tertiary); margin-bottom: 4px; }
  .card-title { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--fg-primary); margin-bottom: 4px; line-height: 1.3; }
  .card-desc { font-family: var(--font-body); font-size: 11px; color: var(--fg-secondary); line-height: 1.5; margin-bottom: 10px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; }
  .card-price { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--brand); }
  .card-unit { font-family: var(--font-body); font-size: 10px; color: var(--fg-tertiary); }
  .card-btn { background: var(--brand); color: white; border: none; border-radius: var(--radius-sm); padding: 6px 12px; font-family: var(--font-label); font-size: 10px; font-weight: 700; letter-spacing: .04em; cursor: pointer; }
  /* egg placeholder */
  .egg { width: 44px; height: 54px; background: var(--color-gold-300); border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; }
  .egg-brown { background: var(--color-warm-400); }
  .chicken-icon { font-size: 40px; }
</style>
</head>
<body>
<div class="cards">
  <div class="card">
    <div class="card-img">
      <div class="egg"></div>
      <div class="card-badge">Хит</div>
    </div>
    <div class="card-body">
      <div class="card-tag">Яйца</div>
      <div class="card-title">Яйца куриные С1</div>
      <div class="card-desc">10 шт · Свободный выгул · Без антибиотиков</div>
      <div class="card-footer">
        <div><div class="card-price">89 ₽</div><div class="card-unit">за десяток</div></div>
        <button class="card-btn">Купить</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-img" style="background: var(--color-warm-100)">
      <div class="egg egg-brown"></div>
    </div>
    <div class="card-body">
      <div class="card-tag">Яйца</div>
      <div class="card-title">Яйца куриные С0</div>
      <div class="card-desc">10 шт · Отборные · Категория высшая</div>
      <div class="card-footer">
        <div><div class="card-price">119 ₽</div><div class="card-unit">за десяток</div></div>
        <button class="card-btn">Купить</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-img" style="background: var(--color-green-100)">
      <svg width="50" height="50" viewBox="0 0 50 50" fill="none">
        <ellipse cx="28" cy="30" rx="16" ry="11" fill="#7a9e7e"/>
        <circle cx="36" cy="22" r="9" fill="#7a9e7e"/>
        <polygon points="44,20 50,23 44,26" fill="#e8a838"/>
        <circle cx="38" cy="20" r="2" fill="white"/>
        <path d="M16,28 Q10,18 24,14 Q20,24 16,28Z" fill="#5e8062"/>
      </svg>
      <div class="card-badge" style="background: var(--nature)">Новинка</div>
    </div>
    <div class="card-body">
      <div class="card-tag">Птица</div>
      <div class="card-title">Курица фермерская</div>
      <div class="card-desc">Охлаждённая · Свободный выгул · ~1.8 кг</div>
      <div class="card-footer">
        <div><div class="card-price">420 ₽</div><div class="card-unit">за кг</div></div>
        <button class="card-btn">Купить</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
