<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-page); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .swatch { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
  .chip { width: 72px; height: 52px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,0.06); }
  .name { font-family: var(--font-label); font-size: 10px; font-weight: 700; color: var(--fg-secondary); letter-spacing: .04em; }
  .hex  { font-family: var(--font-body); font-size: 10px; color: var(--fg-tertiary); }
  .section-label { font-family: var(--font-label); font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--fg-tertiary); margin-bottom: 8px; }
</style>
</head>
<body>
<div class="section-label">Акцент — Шалфей / Луговой зелёный</div>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#f2f7f3"></div><div class="name">50</div><div class="hex">#f2f7f3</div></div>
  <div class="swatch"><div class="chip" style="background:#e0ecdf"></div><div class="name">100</div><div class="hex">#e0ecdf</div></div>
  <div class="swatch"><div class="chip" style="background:#bdd9bf"></div><div class="name">200</div><div class="hex">#bdd9bf</div></div>
  <div class="swatch"><div class="chip" style="background:#95bf98"></div><div class="name">300</div><div class="hex">#95bf98</div></div>
  <div class="swatch"><div class="chip" style="background:#7a9e7e; outline:2px solid #3d2b1f; outline-offset:2px"></div><div class="name">400 ★</div><div class="hex">#7a9e7e</div></div>
  <div class="swatch"><div class="chip" style="background:#5e8062"></div><div class="name">500</div><div class="hex">#5e8062</div></div>
  <div class="swatch"><div class="chip" style="background:#4a6650"></div><div class="name">600</div><div class="hex">#4a6650</div></div>
  <div class="swatch"><div class="chip" style="background:#384e3e"></div><div class="name">700</div><div class="hex">#384e3e</div></div>
</div>
<div class="section-label" style="margin-top:4px">Нейтральный тёплый — Солома / Земля</div>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#fdfaf4; border:1px solid #e8d9c4"></div><div class="name">50</div><div class="hex">#fdfaf4</div></div>
  <div class="swatch"><div class="chip" style="background:#f5edd6"></div><div class="name">100</div><div class="hex">#f5edd6</div></div>
  <div class="swatch"><div class="chip" style="background:#ead9b2"></div><div class="name">200</div><div class="hex">#ead9b2</div></div>
  <div class="swatch"><div class="chip" style="background:#d6bc87"></div><div class="name">300</div><div class="hex">#d6bc87</div></div>
  <div class="swatch"><div class="chip" style="background:#b8955b"></div><div class="name">400</div><div class="hex">#b8955b</div></div>
  <div class="swatch"><div class="chip" style="background:#9a7340"></div><div class="name">500</div><div class="hex">#9a7340</div></div>
  <div class="swatch"><div class="chip" style="background:#7d5c32"></div><div class="name">600</div><div class="hex">#7d5c32</div></div>
  <div class="swatch"><div class="chip" style="background:#3d2b1f; outline:2px solid #c9b299; outline-offset:2px"></div><div class="name">800 ★</div><div class="hex">#3d2b1f</div></div>
</div>
</body>
</html>
