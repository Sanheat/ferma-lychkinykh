/* ── DEADLINE LOGIC ── */
function addWorkDays(date, n) {
  const d = new Date(date);
  let added = 0;
  while (added < n) {
    d.setDate(d.getDate() + 1);
    if (d.getDay() !== 0 && d.getDay() !== 6) added++;
  }
  return d;
}
function getDeadlineInfo() {
  const now = new Date();
  const pastCutoff = now.getHours() > 15 || (now.getHours() === 15 && now.getMinutes() > 0);
  // Find next working deadline day
  let deadline = new Date(now);
  deadline.setHours(15, 0, 0, 0);
  if (pastCutoff) deadline.setDate(deadline.getDate() + 1);
  while (deadline.getDay() === 0 || deadline.getDay() === 6) deadline.setDate(deadline.getDate() + 1);
  const shipment = addWorkDays(deadline, 2);
  // Countdown to deadline
  const msLeft = deadline.getTime() - now.getTime();
  const isToday = deadline.toDateString() === now.toDateString();
  const hoursLeft = Math.floor(msLeft / 3600000);
  const minsLeft  = Math.floor((msLeft % 3600000) / 60000);
  return { deadline, shipment, isToday, hoursLeft, minsLeft, msLeft, pastCutoff };
}

  );

  // Counter for yasik / lotok

  return (

/* ── LINE ITEM ROW ── */
function LineItem({ item, idx, total, onChange, onRemove }) {
  const prod = PRODUCTS.find(p=>p.name===item.product);
  const availPkg = prod ? prod.pkg : ['yasik','paket','lotok'];

  const handleProductChange = (name) => {
    const p = PRODUCTS.find(x=>x.name===name);
    const newPkg = p && !p.pkg.includes(item.packaging) ? p.pkg[0] : item.packaging;
    const newQty = PKG[newPkg].type==='counter' ? '1' : '';
    onChange(idx, { ...item, product:name, packaging:newPkg, qty:newQty });
  };
  const handlePkgChange = (pkgId) => {
    const newQty = PKG[pkgId].type==='counter' ? '1' : '';
    onChange(idx, { ...item, packaging:pkgId, qty:newQty });
  };

  const sel = { ...inp, fontSize:13, padding:'8px 10px' };

  return (
    <div style={{ background:CRD, borderRadius:12, boxShadow:`0 2px 8px rgba(61,43,31,.07)`, marginBottom:10, padding:'14px 16px' }}>
      <div style={{ display:'grid', gridTemplateColumns:'2fr 120px 150px 130px 28px', gap:10, alignItems:'end' }}>
        {/* product */}
        <div>
          <label style={lbl}>Продукт</label>
          <select style={sel} value={item.product} onChange={e=>handleProductChange(e.target.value)}>
            <option value="">— Выберите позицию —</option>
            {PRODUCTS.map(p=>(
              <option key={p.name} value={p.name}>{p.name}</option>
            ))}
          </select>
        </div>
        {/* state */}
        <div>
          <label style={lbl}>Состояние</label>
          <select style={sel} value={item.state} onChange={e=>onChange(idx,{...item,state:e.target.value})}>
            <option value="Охлаждённое">Охлаждённое</option>
            <option value="Замороженное">Замороженное</option>
          </select>
        </div>
        {/* packaging */}
        <div>
          <label style={lbl}>Тара</label>
          <select style={sel} value={item.packaging} onChange={e=>handlePkgChange(e.target.value)}>
            {availPkg.map(pid=>(
              <option key={pid} value={pid}>{PKG[pid].label} ({PKG[pid].note})</option>
            ))}
          </select>
        </div>
        {/* qty */}
        <div>
          <label style={lbl}>{PKG[item.packaging].type==='kg' ? 'Кол-во, кг' : 'Количество'}</label>
          <QtyField pkgId={item.packaging} value={item.qty} onChange={v=>onChange(idx,{...item,qty:v})}/>
        </div>
        {/* remove */}
        {total>1
          ? <button type="button" onClick={()=>onRemove(idx)} style={{ background:'none', border:'none', color:FG3, fontSize:20, lineHeight:1, paddingBottom:6, alignSelf:'flex-end' }}>×</button>
          : <div/>}
      </div>

    </div>
  );
}

            <button onClick={onHistory} style={{ background:'none', border:'none', fontFamily:FL, fontWeight:700, fontSize:12, letterSpacing:'.04em', color:BR }}>История заказов →</button>
            <button onClick={onLogout} style={{ background:'none', border:`1px solid ${BRD}`, borderRadius:6, fontFamily:FL, fontWeight:700, fontSize:11, color:FG3, padding:'5px 12px' }}>Выйти</button>
          </div>
        </div>
      </div>
      <div style={{ maxWidth:900, margin:'0 auto', padding:'24px 24px' }}>
        <div style={{ fontFamily:FD, fontSize:20, fontWeight:700, color:DRK, marginBottom:2 }}>Новая заявка</div>
        <div style={{ fontFamily:FB, fontSize:13, color:FG2, marginBottom:18 }}>{client.name} · {client.address}</div>

        <DeadlineBanner/>

        <div style={{ fontFamily:FL, fontWeight:700, fontSize:10, letterSpacing:'.08em', textTransform:'uppercase', color:FG3, marginBottom:8 }}>Позиции заказа</div>

        {items.map((item,idx)=>(
          <LineItem key={item.uid} item={item} idx={idx} total={items.length} onChange={handleChange} onRemove={handleRemove}/>
        ))}

        <button type="button" onClick={()=>setItems(p=>[...p,mkItem()])} style={{ background:'none', border:`1.5px dashed ${BRD}`, borderRadius:8, padding:'10px', width:'100%', fontFamily:FL, fontWeight:700, fontSize:13, color:FG2, marginBottom:18 }}>
          + Добавить позицию
        </button>

        <div style={{ marginBottom:16 }}>
          <label style={lbl}>Комментарий к заказу</label>
          <textarea style={{...inp, resize:'vertical', minHeight:68}} placeholder="Особые пожелания, удобное время доставки..." value={comment} onChange={e=>setComment(e.target.value)}/>
        </div>

        <button onClick={()=>{
          if(items.some(it=>!it.product||!it.qty)){alert('Заполните все позиции');return;}
          addOrder({ id:genId(), clientName:client.name, deliveryAddress:client.address,
            createdAt:new Date().toISOString(),
            items:items.map(it=>{
              const p=PKG[it.packaging];
              return { product:it.product, state:it.state, packaging:p.label, qty:it.qty, unit:p.unit };
            }),
            comment, status:'pending' });
          setDone(true);
        }} style={{ background:BR, color:CRD, padding:'14px 32px', borderRadius:8, fontFamily:FL, fontWeight:700, fontSize:15, letterSpacing:'.04em', border:'none' }}>
          Отправить заявку
        </button>
      </div>
    </div>
  );
}

                  <span style={{ fontFamily:FL, fontWeight:700, fontSize:11, color:FG3 }}>№ {order.id}</span>

                </tr></thead>
                <tbody>{order.items.map((it,i)=>(
                  <tr key={i}>
                    <td style={tdS}>{it.product}</td>
                    <td style={tdS}>{it.state||'—'}</td>
                    <td style={tdS}>{it.packaging}</td>
                    <td style={tdS}>{it.qty} {it.unit}</td>

              </table>
              {order.comment&&<div style={{ padding:'8px 18px', fontFamily:FB, fontSize:12, color:FG2, background:ALT }}>💬 {order.comment}</div>}

          ))

      </div>

}

        <div style={{ fontFamily:FL, fontWeight:700, fontSize:10, letterSpacing:'.08em', textTransform:'uppercase', color:FG3, background:ALT, display:'inline-block', padding:'4px 10px', borderRadius:9999, marginBottom:18 }}>ПАНЕЛЬ МЕНЕДЖЕРА</div>
        <div style={{ fontFamily:FD, fontSize:22, fontWeight:700, color:DRK, marginBottom:6 }}>Вход для сотрудников</div>

/* ── ORDER DETAIL MODAL ── */
function OrderModal({ order, onClose, onStatus }) {
  if (!order) return null;
  const thS={fontFamily:FL,fontWeight:700,fontSize:10,letterSpacing:'.06em',textTransform:'uppercase',color:FG3,padding:'8px 14px',textAlign:'left',background:ALT,borderBottom:`1px solid ${BRD}`};
  const tdS={fontFamily:FB,fontSize:13,color:DRK,padding:'9px 14px',borderBottom:`1px solid ${BRD}`};
  const stBtn=(active,color)=>({ flex:1, padding:'10px', borderRadius:8, fontFamily:FL, fontWeight:700, fontSize:13, border:`2px solid ${color}`, background:active?color:'transparent', color:active?'white':color, cursor:'pointer' });
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(61,43,31,.5)', zIndex:300, display:'flex', alignItems:'center', justifyContent:'center', padding:24 }} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{ background:CRD, borderRadius:16, boxShadow:'0 16px 48px rgba(61,43,31,.2)', width:'100%', maxWidth:600, maxHeight:'90vh', overflowY:'auto' }}>
        <div style={{ padding:'18px 22px', borderBottom:`1px solid ${BRD}`, display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
          <div>
            <div style={{ fontFamily:FD, fontSize:18, fontWeight:700, color:DRK }}>Заявка № {order.id}</div>
            <div style={{ fontFamily:FB, fontSize:12, color:FG3, marginTop:3 }}>{fmtDate(order.createdAt)}</div>
          </div>
          <button onClick={onClose} style={{ background:'none', border:'none', fontSize:22, color:FG3, lineHeight:1 }}>×</button>
        </div>
        <div style={{ padding:'18px 22px' }}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:16 }}>
            <div><div style={{ fontFamily:FL, fontWeight:700, fontSize:10, letterSpacing:'.06em', textTransform:'uppercase', color:FG3, marginBottom:3 }}>Клиент</div><div style={{ fontFamily:FB, fontSize:14, color:DRK }}>{order.clientName}</div></div>
            <div><div style={{ fontFamily:FL, fontWeight:700, fontSize:10, letterSpacing:'.06em', textTransform:'uppercase', color:FG3, marginBottom:3 }}>Адрес</div><div style={{ fontFamily:FB, fontSize:14, color:DRK }}>{order.deliveryAddress}</div></div>
          </div>
          <table style={{ width:'100%', borderCollapse:'collapse', marginBottom:14 }}>
            <thead><tr><th style={thS}>Продукт</th><th style={thS}>Состояние</th><th style={thS}>Тара</th><th style={thS}>Кол-во</th></tr></thead>
            <tbody>{order.items.map((it,i)=>(
              <tr key={i}><td style={tdS}>{it.product}</td><td style={tdS}>{it.state||'—'}</td><td style={tdS}>{it.packaging}</td><td style={tdS}>{it.qty} {it.unit}</td></tr>
            ))}</tbody>
          </table>
          {order.comment&&<div style={{ background:ALT, borderRadius:8, padding:'10px 14px', fontFamily:FB, fontSize:13, color:FG2, marginBottom:14 }}>💬 {order.comment}</div>}
          <div style={{ fontFamily:FL, fontWeight:700, fontSize:10, letterSpacing:'.07em', textTransform:'uppercase', color:FG3, marginBottom:8 }}>Изменить статус</div>
          <div style={{ display:'flex', gap:10 }}>
            <button style={stBtn(order.status==='pending',ACC)} onClick={()=>onStatus(order.id,'pending')}>В обработке</button>
            <button style={stBtn(order.status==='accepted',NAT)} onClick={()=>onStatus(order.id,'accepted')}>Принята ✓</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── ADMIN PANEL ── */
function AdminPanel({ onLogout }) {
  const [orders,setOrders]=useState(getOrders);
  const [filter,setFilter]=useState('all');
  const [search,setSearch]=useState('');
  const [selected,setSelected]=useState(null);
  useEffect(()=>{ const t=setInterval(()=>setOrders(getOrders()),5000); return()=>clearInterval(t); },[]);

  const changeStatus=(id,st)=>{
    setStatus(id,st);
    setOrders(prev=>prev.map(o=>o.id===id?{...o,status:st}:o));
    setSelected(prev=>prev?.id===id?{...prev,status:st}:prev);
  };
  const filtered=orders.filter(o=>{
    if(filter!=='all'&&o.status!==filter) return false;
    if(search){const q=search.toLowerCase();return o.clientName.toLowerCase().includes(q)||o.id.toLowerCase().includes(q)||o.items.some(it=>it.product.toLowerCase().includes(q));}
    return true;
  });
  const newCount=orders.filter(o=>Date.now()-new Date(o.createdAt).getTime()<10*60*1000&&o.status==='pending').length;
  const pending=orders.filter(o=>o.status==='pending').length;
  const accepted=orders.filter(o=>o.status==='accepted').length;

  const exportXLSX=()=>{
    if(!window.XLSX){alert('Excel недоступен');return;}
    const rows=[];
    (filter==='all'?orders:orders.filter(o=>o.status===filter)).forEach(o=>{
      o.items.forEach(it=>rows.push({
        'Номер':o.id,'Дата':fmtDate(o.createdAt),'Клиент':o.clientName,'Адрес':o.deliveryAddress,
        'Продукт':it.product,'Состояние':it.state||'','Тара':it.packaging,'Кол-во':it.qty,'Ед.':it.unit,
        'Комментарий':o.comment||'','Статус':STATUSES[o.status]?.label||o.status
      }));
    });
    const ws=window.XLSX.utils.json_to_sheet(rows);
    ws['!cols']=[10,16,22,26,22,13,14,8,6,28,12].map(w=>({wch:w}));
    const wb=window.XLSX.utils.book_new();
    window.XLSX.utils.book_append_sheet(wb,ws,'Заявки');
    window.XLSX.writeFile(wb,`Заявки_${new Date().toLocaleDateString('ru-RU').replace(/\./g,'-')}.xlsx`);
  };

  const thS={fontFamily:FL,fontWeight:700,fontSize:10,letterSpacing:'.07em',textTransform:'uppercase',color:FG3,padding:'10px 14px',textAlign:'left',background:ALT,borderBottom:`1px solid ${BRD}`};
  const tdS={fontFamily:FB,fontSize:13,color:DRK,padding:'11px 14px',borderBottom:`1px solid ${BRD}`};
  const fBtn=a=>({ fontFamily:FL, fontWeight:700, fontSize:12, letterSpacing:'.04em', padding:'6px 14px', borderRadius:9999, border:`1.5px solid ${a?BR:BRD}`, background:a?BR:'transparent', color:a?'white':DRK, cursor:'pointer' });

  return (
    <div style={{ display:'flex', flexDirection:'column', minHeight:'100vh', background:BG }}>
      <div style={{ background:DRK, padding:'0 24px', flexShrink:0 }}>
        <div style={{ maxWidth:1200, margin:'0 auto', height:54, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ display:'flex', alignItems:'center', gap:14 }}>
            <LogoLight/>
            {newCount>0&&<span style={{ background:BR, color:'white', fontFamily:FL, fontWeight:700, fontSize:11, padding:'3px 10px', borderRadius:9999 }}>{newCount} новых</span>}
          </div>
          <button onClick={onLogout} style={{ background:'none', border:`1px solid #5e4426`, borderRadius:6, padding:'5px 14px', fontFamily:FL, fontWeight:700, fontSize:11, color:'#9a8070' }}>Выйти</button>
        </div>
      </div>
      <div style={{ background:CRD, borderBottom:`1px solid ${BRD}`, padding:'0 24px', flexShrink:0 }}>
        <div style={{ maxWidth:1200, margin:'0 auto', height:54, display:'flex', alignItems:'center', gap:12 }}>
          <div style={{ position:'relative', flex:1, maxWidth:300 }}>
            <span style={{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', fontSize:13 }}>🔍</span>
            <input style={{...inp,background:ALT,padding:'7px 12px 7px 32px',fontSize:13}} placeholder="Поиск..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <button style={fBtn(filter==='all')} onClick={()=>setFilter('all')}>Все ({orders.length})</button>
          <button style={fBtn(filter==='pending')} onClick={()=>setFilter('pending')}>В обработке ({pending})</button>
          <button style={fBtn(filter==='accepted')} onClick={()=>setFilter('accepted')}>Принятые ({accepted})</button>
          <div style={{ flex:1 }}/>
          <button onClick={exportXLSX} style={{ background:'#1D6F42', color:'white', padding:'7px 16px', borderRadius:7, fontFamily:FL, fontWeight:700, fontSize:12, letterSpacing:'.04em', border:'none', display:'flex', alignItems:'center', gap:6 }}>↓ Excel</button>
        </div>
      </div>
      <div style={{ flex:1, overflowY:'auto' }}>
        <div style={{ maxWidth:1200, margin:'0 auto', padding:'20px 24px' }}>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12, marginBottom:18 }}>
            {[['В обработке',pending,ACC],['Принятые',accepted,NAT],['Всего заявок',orders.length,FG3]].map(([l,n,c])=>(
              <div key={l} style={{ background:CRD, borderRadius:10, padding:'14px 18px', boxShadow:`0 2px 8px rgba(61,43,31,.07)`, borderLeft:`3px solid ${c}` }}>
                <div style={{ fontFamily:FD, fontSize:26, fontWeight:700, color:DRK }}>{n}</div>
                <div style={{ fontFamily:FB, fontSize:12, color:FG3 }}>{l}</div>
              </div>
            ))}
          </div>
          {filtered.length===0
            ?<div style={{ textAlign:'center', padding:'60px 0', fontFamily:FB, fontSize:15, color:FG3 }}>Заявок не найдено</div>
            :<div style={{ background:CRD, borderRadius:12, boxShadow:`0 2px 8px rgba(61,43,31,.07)`, overflow:'hidden' }}>
              <table style={{ width:'100%', borderCollapse:'collapse' }}>
                <thead><tr>
                  <th style={thS}>№ Заявки</th><th style={thS}>Дата и время</th><th style={thS}>Клиент</th><th style={thS}>Позиции</th><th style={thS}>Статус</th>
                </tr></thead>
                <tbody>{filtered.map(order=>{
                  const isNew=Date.now()-new Date(order.createdAt).getTime()<10*60*1000&&order.status==='pending';
                  return (
                    <tr key={order.id} style={{ cursor:'pointer' }}
                      onMouseEnter={e=>e.currentTarget.style.background='#fef9f8'}
                      onMouseLeave={e=>e.currentTarget.style.background=CRD}
                      onClick={()=>setSelected(order)}>
                      <td style={tdS}>{isNew&&<span style={{ display:'inline-block', width:7, height:7, borderRadius:'50%', background:BR, marginRight:5, verticalAlign:'middle' }}/>}<span style={{ fontFamily:FL, fontWeight:700, fontSize:11, color:FG3 }}>{order.id}</span></td>
                      <td style={{...tdS,fontSize:12}}>{fmtDate(order.createdAt)}</td>
                      <td style={{...tdS,fontWeight:700}}>{order.clientName}</td>
                      <td style={{...tdS,color:FG2,fontSize:12}}>{order.items.length} поз. · {order.items.map(i=>i.product).join(', ').slice(0,50)}{order.items.map(i=>i.product).join(', ').length>50?'…':''}</td>
                      <td style={tdS}><Badge status={order.status}/></td>
                    </tr>
                  );
                })}</tbody>
              </table>
            </div>
          }
        </div>
      </div>
      <OrderModal order={selected} onClose={()=>setSelected(null)} onStatus={changeStatus}/>
    </div>
  );
}

/* ── ROOT APP ── */
function App() {
  const [mode,setMode]=useState(()=>window.location.hash==='#admin'?'admin':'client');
  const [adminAuthed,setAdminAuthed]=useState(false);
  const [client,setClient]=useState(getClient);
  const [view,setView]=useState('form');

  const goAdmin=()=>{window.location.hash='#admin';setMode('admin');};
  const goClient=()=>{window.location.hash='';setMode('client');setAdminAuthed(false);};

  if(mode==='admin'){
    if(!adminAuthed) return <AdminLogin onLogin={()=>setAdminAuthed(true)} onBack={goClient}/>;
    return <AdminPanel onLogout={goClient}/>;
  }
  if(!client) return <ClientLogin onLogin={c=>setClient(c)} onAdmin={goAdmin}/>;
  if(view==='history') return <OrderHistory client={client} onBack={()=>setView('form')}/>;
  return <OrderForm client={client} onHistory={()=>setView('history')} onLogout={()=>{saveClient(null);setClient(null);}}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
