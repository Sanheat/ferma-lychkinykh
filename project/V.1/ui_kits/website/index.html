<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лычкины птички — Фермерские продукты</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400&family=PT+Sans:ital,wght@0,400;0,700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --brand: #c94030; --brand-hover: #a8331f; --brand-light: #fdf2f1;
  --accent: #e8a838; --nature: #7a9e7e; --nature-light: #f2f7f3;
  --fg-primary: #3d2b1f; --fg-secondary: #6b5245; --fg-tertiary: #9a8070;
  --bg-page: #fdfaf4; --bg-card: #ffffff; --bg-section-alt: #f5edd6;
  --bg-dark: #3d2b1f; --bg-nature: #f2f7f3;
  --border-light: #e8d9c4; --border-medium: #c9b299;
  --shadow-sm: 0 2px 8px rgba(61,43,31,.10);
  --shadow-md: 0 4px 16px rgba(61,43,31,.13);
  --shadow-lg: 0 8px 32px rgba(61,43,31,.15);
  --radius-md: 8px; --radius-lg: 12px; --radius-pill: 9999px;
  --font-display: 'PT Serif', Georgia, serif;
  --font-body: 'PT Sans', Arial, sans-serif;
  --font-label: 'Nunito', sans-serif;
}
html { scroll-behavior: smooth; }
body { font-family: var(--font-body); color: var(--fg-primary); background: var(--bg-page); -webkit-font-smoothing: antialiased; }
button { cursor: pointer; font-family: var(--font-label); border: none; }
a { text-decoration: none; color: inherit; }
img { display: block; max-width: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── TOKENS ── */
const C = {
  brand: '#c94030', brandHover: '#a8331f', accent: '#e8a838',
  nature: '#7a9e7e', bg: '#fdfaf4', card: '#fff', alt: '#f5edd6',
  dark: '#3d2b1f', border: '#e8d9c4', fg2: '#6b5245', fg3: '#9a8070',
};

/* ── LOGO SVG ── */
function Logo({ size = 44, light = false }) {
  const red = light ? '#fae0dc' : C.brand;
  const dark = light ? '#fdfaf4' : C.dark;
  const gold = C.accent;
  return (
    <svg width={size * 4.2} height={size} viewBox="0 0 185 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      {/* bird */}
      <ellipse cx="22" cy="28" rx="14" ry="9" fill={red}/>
      <circle cx="33" cy="20" r="8" fill={red}/>
      <polygon points="40,18 47,21 40,24" fill={gold}/>
      <circle cx="35" cy="18" r="1.8" fill="white"/>
      <path d="M11,26 Q5,14 20,11 Q16,22 11,26Z" fill={light ? '#f5bdb6' : '#a8331f'}/>
      <path d="M9,30 Q1,24 6,36Z" fill={light ? '#f5bdb6' : '#a8331f'}/>
      {/* wordmark */}
      <text x="54" y="22" fontFamily="PT Serif, Georgia, serif" fontSize="16" fontWeight="700" fill={dark}>Лычкины</text>
      <text x="54" y="40" fontFamily="PT Serif, Georgia, serif" fontSize="16" fontWeight="700" fill={red}>птички</text>
    </svg>
  );
}

/* ── HEADER ── */
function Header({ cartCount, onCartClick, currentPage, onNav }) {
  const [scrolled, setScrolled] = useState(false);
  const [mobileOpen, setMobileOpen] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

  const navItems = [
    { id: 'home', label: 'Главная' },
    { id: 'products', label: 'Продукты' },
    { id: 'about', label: 'О ферме' },
    { id: 'contact', label: 'Контакты' },
  ];

  const s = {
    header: {
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      background: scrolled ? 'rgba(253,250,244,0.96)' : 'transparent',
      backdropFilter: scrolled ? 'blur(12px)' : 'none',
      borderBottom: scrolled ? `1px solid ${C.border}` : 'none',
      transition: 'all 250ms ease',
      padding: '0 24px',
    },
    inner: { maxWidth: 1200, margin: '0 auto', height: 68, display: 'flex', alignItems: 'center', justifyContent: 'space-between' },
    nav: { display: 'flex', gap: 32, alignItems: 'center' },
    navLink: (active) => ({
      fontFamily: "'Nunito', sans-serif", fontWeight: 700, fontSize: 14,
      letterSpacing: '.04em', color: active ? C.brand : C.dark,
      borderBottom: active ? `2px solid ${C.brand}` : '2px solid transparent',
      paddingBottom: 2, transition: 'color 150ms', cursor: 'pointer',
    }),
    cart: {
      display: 'flex', alignItems: 'center', gap: 6,
      background: C.brand, color: 'white', border: 'none',
      borderRadius: 9999, padding: '8px 16px', fontSize: 13,
      fontFamily: "'Nunito', sans-serif", fontWeight: 700, cursor: 'pointer',
      transition: 'background 150ms',
    },
  };

  return (
    <header style={s.header}>
      <div style={s.inner}>
        <div onClick={() => onNav('home')} style={{ cursor: 'pointer' }}>
          <Logo size={34} light={false} />
        </div>
        <nav style={s.nav}>
          {navItems.map(item => (
            <span key={item.id} style={s.navLink(currentPage === item.id)} onClick={() => onNav(item.id)}>
              {item.label}
            </span>
          ))}
        </nav>
        <button style={s.cart} onClick={onCartClick}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          Корзина {cartCount > 0 && <span style={{ background: 'white', color: C.brand, borderRadius: 9999, minWidth: 18, height: 18, display:'inline-flex', alignItems:'center', justifyContent:'center', fontSize:11 }}>{cartCount}</span>}
        </button>
      </div>
    </header>
  );
}

/* ── HERO ── */
function Hero({ onShop }) {
  const s = {
    section: {
      minHeight: '100vh', display: 'flex', alignItems: 'center',
      background: `linear-gradient(160deg, #fdf2f1 0%, #fdfaf4 40%, #f5edd6 100%)`,
      position: 'relative', overflow: 'hidden', paddingTop: 68,
    },
    bg: {
      position: 'absolute', inset: 0, opacity: 0.04,
      backgroundImage: `radial-gradient(circle at 2px 2px, #3d2b1f 1px, transparent 0)`,
      backgroundSize: '32px 32px',
    },
    inner: { maxWidth: 1200, margin: '0 auto', padding: '80px 24px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 64, alignItems: 'center' },
    eyebrow: { fontFamily: "'Nunito', sans-serif", fontWeight: 700, fontSize: 12, letterSpacing: '.12em', textTransform: 'uppercase', color: C.brand, marginBottom: 16, display: 'flex', alignItems: 'center', gap: 8 },
    h1: { fontFamily: "'PT Serif', Georgia, serif", fontSize: 'clamp(2rem, 3.2vw, 2.8rem)', fontWeight: 700, lineHeight: 1.2, color: C.dark, marginBottom: 20, letterSpacing: '-0.01em' },
    accent: { color: C.brand },
    lead: { fontFamily: "'PT Sans', Arial, sans-serif", fontSize: 18, lineHeight: 1.7, color: '#6b5245', marginBottom: 36, maxWidth: 460 },
    ctas: { display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'center' },
    btnPrimary: { background: C.brand, color: 'white', padding: '14px 28px', borderRadius: 8, fontFamily: "'Nunito', sans-serif", fontWeight: 700, fontSize: 15, letterSpacing: '.04em', border: 'none', cursor: 'pointer', boxShadow: '0 4px 16px rgba(201,64,48,.25)', transition: 'all 150ms' },
    btnSecondary: { background: 'transparent', color: C.brand, padding: '13px 26px', borderRadius: 8, fontFamily: "'Nunito', sans-serif", fontWeight: 700, fontSize: 15, border: `2px solid ${C.brand}`, cursor: 'pointer', transition: 'all 150ms' },
    stats: { display: 'flex', gap: 32, marginTop: 32 },
    stat: { display: 'flex', flexDirection: 'column', gap: 2 },
    statNum: { fontFamily: "'PT Serif', Georgia, serif", fontSize: 26, fontWeight: 700, color: C.dark, whiteSpace: 'nowrap' },
    statLabel: { fontSize: 12, color: '#9a8070', fontFamily: "'PT Sans', Arial, sans-serif" },
    imageArea: { position: 'relative', height: 420, borderRadius: 20, overflow: 'hidden' },
    imagePlaceholder: { width: '100%', height: '100%', background: `linear-gradient(135deg, #f5edd6, #ead9b2)`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 16, borderRadius: 20 },
    floatCard: { position: 'absolute', bottom: 24, left: 24, background: 'white', borderRadius: 12, padding: '12px 16px', boxShadow: '0 8px 24px rgba(61,43,31,.15)', display: 'flex', alignItems: 'center', gap: 12 },
    floatDot: { width: 10, height: 10, borderRadius: 9999, background: '#7a9e7e', flexShrink: 0 },
  };
  return (
    <section style={s.section} id="home">
      <div style={s.bg}/>
      <div style={s.inner}>
        <div>
          <div style={s.eyebrow}>
            <span style={{ display:'inline-block', width:20, height:2, background:C.brand }}/>
            Ферма Лычкиных · с 2010 года
          </div>
          <h1 style={s.h1}>
            Фермерские яйца<br/>
            <span style={s.accent}>прямо от наших</span><br/>
            курочек
          </h1>
          <p style={s.lead}>
            Мы выращиваем птицу с любовью и заботой — каждый день свежие яйца и натуральное мясо птицы без антибиотиков и добавок.
          </p>
          <div style={s.ctas}>
            <button style={s.btnPrimary} onClick={onShop}>Купить сейчас</button>
            <button style={s.btnSecondary}>О ферме</button>
          </div>
          <div style={s.stats}>
            {[['15+', 'лет на рынке'], ['5 000', 'кур на выгуле'], ['100%', 'натуральный']].map(([n, l]) => (
              <div key={n} style={s.stat}><span style={s.statNum}>{n}</span><span style={s.statLabel}>{l}</span></div>
            ))}
          </div>
        </div>
        <div style={s.imageArea}>
          <div style={s.imagePlaceholder}>
            {/* decorative eggs */}
            {[['#e8a838', 70, 90], ['#d6bc87', 130, 160], ['#c9b299', 60, 200], ['#b8955b', 110, 80]].map(([c, x, y], i) => (
              <div key={i} style={{ position:'absolute', left:x, top:y, width:48+i*8, height:60+i*10, background:c, borderRadius:'50% 50% 50% 50% / 60% 60% 40% 40%', opacity:.7 }}/>
            ))}
            <svg width="120" height="120" viewBox="0 0 100 100" style={{ position:'relative', zIndex:1 }}>
              <ellipse cx="60" cy="64" rx="28" ry="18" fill={C.brand} opacity=".9"/>
              <circle cx="72" cy="44" r="16" fill={C.brand} opacity=".9"/>
              <polygon points="86,40 96,44 86,48" fill={C.accent}/>
              <circle cx="75" cy="41" r="3.5" fill="white"/>
              <path d="M36,60 Q26,40 52,34 Q46,52 36,60Z" fill="#a8331f"/>
              <path d="M32,66 Q20,58 28,74Z" fill="#a8331f"/>
            </svg>
            <span style={{ fontFamily:"'PT Serif',serif", fontSize:15, color:'#9a8070', position:'relative', zIndex:1 }}>Здесь будет фото фермы</span>
          </div>
          <div style={s.floatCard}>
            <div style={s.floatDot}/>
            <div>
              <div style={{ fontFamily:"'Nunito',sans-serif", fontWeight:700, fontSize:12, color:C.dark }}>Свежие каждый день</div>
              <div style={{ fontFamily:"'PT Sans',sans-serif", fontSize:11, color:'#9a8070' }}>Доставка по городу</div>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ── PRODUCT DATA ── */
const PRODUCTS = [
  { id:1, name:'Яйца куриные С1', cat:'Яйца', price:89, unit:'за десяток', badge:'Хит', desc:'10 шт · Свободный выгул · Без антибиотиков', color:'#f8cc55', shape:'egg' },
  { id:2, name:'Яйца куриные С0', cat:'Яйца', price:119, unit:'за десяток', badge:null, desc:'10 шт · Отборные · Высшая категория', color:'#b8955b', shape:'egg' },
  { id:3, name:'Яйца перепелиные', cat:'Яйца', price:69, unit:'за 20 шт', badge:'Новинка', desc:'20 шт · Диетический продукт', color:'#d6bc87', shape:'egg-small' },
  { id:4, name:'Курица фермерская', cat:'Птица', price:420, unit:'за кг', badge:null, desc:'Охлаждённая · Свободный выгул · ~1.8 кг', color:'#7a9e7e', shape:'bird' },
  { id:5, name:'Цыплёнок бройлер', cat:'Птица', price:310, unit:'за кг', badge:null, desc:'Охлаждённый · Молодая птица', color:'#95bf98', shape:'bird' },
  { id:6, name:'Утка фермерская', cat:'Птица', price:480, unit:'за кг', badge:'Сезонный', desc:'Охлаждённая · Под заказ', color:'#5e8062', shape:'duck' },
];

function EggShape({ color, small }) {
  const w = small ? 28 : 36, h = small ? 34 : 44;
  return <div style={{ width:w, height:h, background:color, borderRadius:'50% 50% 50% 50% / 60% 60% 40% 40%', opacity:.85 }}/>;
}
function BirdShape({ color }) {
  return (
    <svg width="52" height="46" viewBox="0 0 52 46" fill="none">
      <ellipse cx="28" cy="32" rx="16" ry="10" fill={color}/>
      <circle cx="36" cy="20" r="10" fill={color}/>
      <polygon points="45,17 52,20 45,23" fill={C.accent}/>
      <circle cx="38" cy="18" r="2.5" fill="white"/>
      <path d="M14,30 Q7,18 26,14 Q22,24 14,30Z" fill={color} opacity=".7"/>
    </svg>
  );
}

function ProductCard({ product, onAdd, added }) {
  const s = {
    card: { background:'white', borderRadius:12, boxShadow:'0 2px 8px rgba(61,43,31,.08)', overflow:'hidden', display:'flex', flexDirection:'column', transition:'all 200ms', cursor:'default' },
    img: { height:130, background:`linear-gradient(135deg, ${product.color}22, ${product.color}44)`, display:'flex', alignItems:'center', justifyContent:'center', position:'relative' },
    badge: { position:'absolute', top:10, left:10, background: product.badge==='Новинка'?'#7a9e7e': product.badge==='Сезонный'?'#e8a838':C.brand, color: product.badge==='Сезонный'?C.dark:'white', fontFamily:"'Nunito',sans-serif", fontWeight:700, fontSize:10, letterSpacing:'.04em', padding:'3px 9px', borderRadius:9999, textTransform:'uppercase' },
    body: { padding:'14px 16px', display:'flex', flexDirection:'column', gap:6, flex:1 },
    cat: { fontFamily:"'Nunito',sans-serif", fontWeight:700, fontSize:10, letterSpacing:'.08em', textTransform:'uppercase', color:'#9a8070' },
    name: { fontFamily:"'PT Serif',Georgia,serif", fontSize:15, fontWeight:700, color:C.dark, lineHeight:1.3 },
    desc: { fontFamily:"'PT Sans',Arial,sans-serif", fontSize:11, color:'#9a8070', lineHeight:1.5 },
    footer: { display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:'auto', paddingTop:10 },
    price: { fontFamily:"'PT Serif',Georgia,serif", fontSize:18, fontWeight:700, color:C.brand },
    unit: { fontFamily:"'PT Sans',Arial,sans-serif", fontSize:10, color:'#9a8070', marginTop:1 },
    btn: { background: added?'#7a9e7e':C.brand, color:'white', padding:'7px 14px', borderRadius:6, fontFamily:"'Nunito',sans-serif", fontWeight:700, fontSize:11, letterSpacing:'.03em', border:'none', cursor:'pointer', transition:'background 200ms' },
  };
  return (
    <div style={s.card} onMouseEnter={e => e.currentTarget.style.boxShadow='0 6px 20px rgba(61,43,31,.14)'} onMouseLeave={e => e.currentTarget.style.boxShadow='0 2px 8px rgba(61,43,31,.08)'}>
      <div style={s.img}>
        {product.shape==='egg' && <EggShape color={product.color}/>}
        {product.shape==='egg-small' && <EggShape color={product.color} small/>}
        {(product.shape==='bird'||product.shape==='duck') && <BirdShape color={product.color}/>}
        {product.badge && <span style={s.badge}>{product.badge}</span>}
      </div>
      <div style={s.body}>
        <div style={s.cat}>{product.cat}</div>
        <div style={s.name}>{product.name}</div>
        <div style={s.desc}>{product.desc}</div>
        <div style={s.footer}>
          <div><div style={s.price}>{product.price} ₽</div><div style={s.unit}>{product.unit}</div></div>
          <button style={s.btn} onClick={() => onAdd(product)}>{added?'✓ В корзине':'Купить'}</button>
        </div>
      </div>
    </div>
  );
}

/* ── PRODUCT SECTION ── */
function ProductSection({ cart, onAdd }) {
  const [filter, setFilter] = useState('Все');
  const cats = ['Все', 'Яйца', 'Птица'];
  const filtered = filter==='Все' ? PRODUCTS : PRODUCTS.filter(p => p.cat===filter);

  const s = {
    section: { padding:'96px 24px', background:'#fdfaf4', id:'products' },
    inner: { maxWidth:1200, margin:'0 auto' },
    header: { textAlign:'center', marginBottom:48 },
    eyebrow: { fontFamily:"'Nunito',sans-serif", fontWeight:700, fontSize:12, letterSpacing:'.12em', textTransform:'uppercase', color:C.brand, marginBottom:12 },
    h2: { fontFamily:"'PT Serif',Georgia,serif", fontSize:'clamp(1.8rem,3vw,2.5rem)', fontWeight:700, color:C.dark, marginBottom:16, lineHeight:1.2 },
    lead: { fontFamily:"'PT Sans',Arial,sans-serif", fontSize:17, color:'#6b5245', maxWidth:500, margin:'0 auto' },
    tabs: { display:'flex', gap:8, justifyContent:'center', marginTop:32, flexWrap:'wrap' },
    tab: (active) => ({ fontFamily:"'Nunito',sans-serif", fontWeight:700, fontSize:13, letterSpacing:'.04em', padding:'8px 20px', borderRadius:9999, border:`2px solid ${active?C.brand:C.border}`, background:active?C.brand:'white', color:active?'white':C.dark, cursor:'pointer', transition:'all 150ms' }),
    grid: { display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(240px,1fr))', gap:20, marginTop:40 },
  };
  return (
    <section style={s.section} id="products">
      <div style={s.inner}>
        <div style={s.header}>
          <div style={s.eyebrow}>Наши продукты</div>
          <h2 style={s.h2}>Свежее с фермы — прямо к вам</h2>
          <p style={s.lead}>Все продукты выращены на ферме Лычкиных без антибиотиков и искусственных добавок</p>
          <div style={s.tabs}>
            {cats.map(c => <button key={c} style={s.tab(filter===c)} onClick={()=>setFilter(c)}>{c}</button>)}
          </div>
        </div>
        <div style={s.grid}>
          {filtered.map(p => <ProductCard key={p.id} product={p} onAdd={onAdd} added={cart.some(ci=>ci.id===p.id)}/>)}
        </div>
      </div>
    </section>
  );
}

/* ── ABOUT STRIP ── */
function AboutStrip({ onContact }) {
  const features = [
    { icon:'🌿', title:'Натуральный корм', desc:'Зерно, трава, без ГМО и антибиотиков' },
    { icon:'🏡', title:'Свободный выгул', desc:'Куры живут на воле, а не в клетках' },
    { icon:'📦', title:'Своя доставка', desc:'Свежие продукты привозим сами' },
    { icon:'✅', title:'Контроль качества', desc:'Ветеринарные сертификаты на все продукты' },
  ];
  const s = {
    section: { background:'#f5edd6', padding:'80px 24px' },
    inner: { maxWidth:1200, margin:'0 auto', display:'grid', gridTemplateColumns:'1fr 1fr', gap:64, alignItems:'center' },
    eyebrow: { fontFamily:"'Nunito',sans-serif", fontWeight:700, fontSize:12, letterSpacing:'.12em', textTransform:'uppercase', color:C.brand, marginBottom:12 },
    h2: { fontFamily:"'PT Serif',Georgia,serif", fontSize:'clamp(1.6rem,2.5vw,2.2rem)', fontWeight:700, color:C.dark, lineHeight:1.2, marginBottom:20 },
    lead: { fontFamily:"'PT Sans',Arial,sans-serif", fontSize:16, color:'#6b5245', lineHeight:1.7, marginBottom:28 },
    btn: { background:C.dark, color:'#fdfaf4', padding:'13px 26px', borderRadius:8, fontFamily:"'Nunito',sans-serif", fontWeight:700, fontSize:14, border:'none', cursor:'pointer', letterSpacing:'.04em' },
    grid: { display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 },
    feat: { background:'white', borderRadius:12, padding:'20px', boxShadow:'0 2px 8px rgba(61,43,31,.07)' },
    featIcon: { fontSize:24, marginBottom:8 },
    featTitle: { fontFamily:"'PT Serif',Georgia,serif", fontWeight:700, fontSize:15, color:C.dark, marginBottom:4 },
    featDesc: { fontFamily:"'PT Sans',Arial,sans-serif", fontSize:13, color:'#9a8070', lineHeight:1.5 },
  };
  return (
    <section style={s.section} id="about">
      <div style={s.inner}>
        <div>
          <div style={s.eyebrow}>О ферме</div>
          <h2 style={s.h2}>Семейная ферма с заботой о каждой птичке</h2>
          <p style={s.lead}>С 2010 года мы выращиваем птицу по традиционным методам — никакой промышленной спешки. Каждая курочка у нас на свободном выгуле, питается натуральным кормом и живёт в тепле и заботе.</p>
          <button style={s.btn} onClick={onContact}>Связаться с нами</button>
        </div>
        <div style={s.grid}>
          {features.map(f => (
            <div key={f.title} style={s.feat}>
              <div style={s.featIcon}>{f.icon}</div>
              <div style={s.featTitle}>{f.title}</div>
              <div style={s.featDesc}>{f.desc}</div>

/* ── CONTACT SECTION ── */
function ContactSection() {
  const [form, setForm] = useState({ name:'', phone:'', comment:'' });
  const [sent, setSent] = useState(false);
  const s = {
    section: { background:'#fdfaf4', padding:'80px 24px' },
    inner: { maxWidth:560, margin:'0 auto', textAlign:'center' },
    eyebrow: { fontFamily:"'Nunito',sans-serif", fontWeight:700, fontSize:12, letterSpacing:'.12em', textTransform:'uppercase', color:C.brand, marginBottom:12 },
    h2: { fontFamily:"'PT Serif',Georgia,serif", fontSize:'clamp(1.6rem,2.5vw,2.2rem)', fontWeight:700, color:C.dark, lineHeight:1.2, marginBottom:12 },
    lead: { fontFamily:"'PT Sans',Arial,sans-serif", fontSize:15, color:'#6b5245', marginBottom:36 },
    form: { display:'flex', flexDirection:'column', gap:14, textAlign:'left' },
    label: { fontFamily:"'Nunito',sans-serif", fontWeight:700, fontSize:11, letterSpacing:'.06em', textTransform:'uppercase', color:'#6b5245', marginBottom:4, display:'block' },
    input: { width:'100%', fontFamily:"'PT Sans',Arial,sans-serif", fontSize:15, color:C.dark, background:'white', border:`1.5px solid #e8d9c4`, borderRadius:8, padding:'11px 14px', outline:'none' },
    btn: { background:C.brand, color:'white', padding:'14px', borderRadius:8, fontFamily:"'Nunito',sans-serif", fontWeight:700, fontSize:15, letterSpacing:'.04em', border:'none', cursor:'pointer', marginTop:4 },
    success: { background:'#f2f7f3', border:`2px solid #7a9e7e`, borderRadius:12, padding:'28px', textAlign:'center' },
  };
  if (sent) return (
    <section style={s.section} id="contact">
      <div style={s.inner}>
        <div style={s.success}>
          <div style={{ fontSize:32, marginBottom:12 }}>✓</div>
          <div style={{ fontFamily:"'PT Serif',serif", fontSize:20, fontWeight:700, color:C.dark, marginBottom:8 }}>Спасибо за заявку!</div>
          <div style={{ fontFamily:"'PT Sans',sans-serif", fontSize:14, color:'#6b5245' }}>Мы свяжемся с вами в течение часа.</div>
        </div>
      </div>
    </section>
  );
  return (
    <section style={s.section} id="contact">
      <div style={s.inner}>
        <div style={s.eyebrow}>Контакты</div>
        <h2 style={s.h2}>Свяжитесь с нами</h2>
        <p style={s.lead}>Оставьте заявку и мы перезвоним вам в течение часа</p>
        <form style={s.form} onSubmit={e=>{e.preventDefault();setSent(true);}}>
          <div><label style={s.label}>Ваше имя</label><input style={s.input} value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Иван Иванов" required/></div>
          <div><label style={s.label}>Телефон</label><input style={s.input} value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="+7 (999) 000-00-00" required/></div>
          <div><label style={s.label}>Комментарий</label><textarea style={{...s.input, resize:'vertical'}} rows={3} value={form.comment} onChange={e=>setForm({...form,comment:e.target.value})} placeholder="Что вас интересует?"/></div>
          <button type="submit" style={s.btn}>Отправить заявку</button>
        </form>
      </div>
    </section>
  );
}

/* ── CART SIDEBAR ── */
function CartSidebar({ open, cart, onClose, onRemove }) {
  const total = cart.reduce((s,i) => s + i.price * i.qty, 0);
  const s = {
    overlay: { position:'fixed', inset:0, background:'rgba(61,43,31,.35)', zIndex:200, opacity:open?1:0, pointerEvents:open?'auto':'none', transition:'opacity 250ms' },
    sidebar: { position:'fixed', top:0, right:0, bottom:0, width:360, background:'white', zIndex:201, boxShadow:'-8px 0 32px rgba(61,43,31,.15)', transform:open?'translateX(0)':'translateX(100%)', transition:'transform 300ms cubic-bezier(.2,0,.2,1)', display:'flex', flexDirection:'column' },
    head: { padding:'20px 24px', borderBottom:`1px solid #e8d9c4`, display:'flex', justifyContent:'space-between', alignItems:'center' },
    title: { fontFamily:"'PT Serif',serif", fontSize:20, fontWeight:700, color:C.dark },
    close: { background:'none', border:'none', fontSize:24, color:'#9a8070', cursor:'pointer', lineHeight:1 },
    body: { flex:1, overflowY:'auto', padding:'16px 24px' },
    empty: { textAlign:'center', padding:'48px 0', color:'#9a8070', fontFamily:"'PT Sans',sans-serif", fontSize:15 },
    item: { display:'flex', gap:12, padding:'12px 0', borderBottom:`1px solid #e8d9c4` },
    itemName: { fontFamily:"'PT Serif',serif", fontSize:14, fontWeight:700, color:C.dark, marginBottom:2 },
    itemPrice: { fontFamily:"'PT Sans',sans-serif", fontSize:12, color:'#9a8070' },
    itemRemove: { background:'none', border:'none', color:'#9a8070', fontSize:18, cursor:'pointer', marginLeft:'auto', alignSelf:'flex-start' },
    foot: { padding:'20px 24px', borderTop:`1px solid #e8d9c4` },
    totalRow: { display:'flex', justifyContent:'space-between', marginBottom:16 },
    totalLabel: { fontFamily:"'Nunito',sans-serif", fontWeight:700, fontSize:14, color:'#6b5245' },
    totalVal: { fontFamily:"'PT Serif',serif", fontSize:20, fontWeight:700, color:C.dark },
    checkoutBtn: { width:'100%', background:C.brand, color:'white', padding:'14px', borderRadius:8, fontFamily:"'Nunito',sans-serif", fontWeight:700, fontSize:15, border:'none', cursor:'pointer' },
  };
  return (
    <>
      <div style={s.overlay} onClick={onClose}/>
      <div style={s.sidebar}>
        <div style={s.head}>
          <span style={s.title}>Корзина</span>
          <button style={s.close} onClick={onClose}>×</button>
        </div>
        <div style={s.body}>
          {cart.length===0 ? <div style={s.empty}>Корзина пуста</div> : cart.map(item => (
            <div key={item.id} style={s.item}>
              <div style={{ width:44, height:44, background:`${item.color}33`, borderRadius:8, flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
                <EggShape color={item.color} small/>
              </div>
              <div style={{ flex:1 }}>
                <div style={s.itemName}>{item.name}</div>
                <div style={s.itemPrice}>{item.price} ₽ · {item.unit}</div>
              </div>
              <button style={s.itemRemove} onClick={()=>onRemove(item.id)}>×</button>
            </div>
          ))}
        </div>
        {cart.length>0 && (
          <div style={s.foot}>
            <div style={s.totalRow}>
              <span style={s.totalLabel}>Итого:</span>
              <span style={s.totalVal}>{total} ₽</span>
            </div>
            <button style={s.checkoutBtn}>Оформить заказ</button>
          </div>
        )}
      </div>
    </>
  );
}

        <div>
          <div style={s.colTitle}>Контакты</div>

      <div style={{ maxWidth:1200, margin:'0 auto' }}>
        <div style={s.divider}>
          <span style={s.copy}>© 2024 Ферма Лычкиных. Все права защищены.</span>
          <span style={s.copy}>Политика конфиденциальности</span>

      </div>

}

/* ── APP ── */
function App() {
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);
  const [page, setPage] = useState('home');

  const addToCart = (product) => {
    setCart(prev => {
      if (prev.find(i => i.id===product.id)) return prev;
      return [...prev, { ...product, qty:1 }];
    });
    setCartOpen(true);
  };
  const removeFromCart = (id) => setCart(prev => prev.filter(i => i.id!==id));

  const scrollTo = (id) => {
    setPage(id);
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior:'smooth' });
  };

  return (
    <div>
      <Header cartCount={cart.length} onCartClick={()=>setCartOpen(true)} currentPage={page} onNav={scrollTo}/>
      <Hero onShop={()=>scrollTo('products')}/>
      <ProductSection cart={cart} onAdd={addToCart}/>
      <AboutStrip onContact={()=>scrollTo('contact')}/>
      <ContactSection/>
      <Footer/>
      <CartSidebar open={cartOpen} cart={cart} onClose={()=>setCartOpen(false)} onRemove={removeFromCart}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
